<div class="pendingFarmers">
    <div class="title text-center m-3">
        <h1>Pending Farmers Approvals</h1>
    </div>
    <div class="searchbar">
    <input type="search" placeholder="Serch Farmer" style="width: 350px;">
        <div class="all">
            <label for="all">ALL</label>
            <input type="checkbox" id="all" class="large">
        </div>
    </div>
    <div class="farmers row">
        <div class="pending col-md-3" *ngFor="let pendingFarmers of PendingFarmers">
            <div class="img">
                <i class="bi bi-person-circle"></i>
            </div>
            <div class="info">
                <h3>{{pendingFarmers.name}}</h3>
                <h6>{{pendingFarmers.email}}</h6>
                <h6>{{pendingFarmers.m_no}}</h6>
            </div>
            <div class="checkBox">
                <input type="checkbox" class="large">
            </div>
        </div>
    </div>
</div>
