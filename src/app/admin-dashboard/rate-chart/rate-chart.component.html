<div class="ratechart">
    <h2>Rate Chart</h2>
    <div class="rate">
        <div class="amount">
            <label for="">Starting amount :</label>&nbsp;&nbsp;&nbsp;
            <input type="number" placeholder="Enter amount" [(ngModel)]="baseprice">
        </div>
        <div class="steps">
            <div class="step">
                <div class="header">
                    <span>Fat Step</span>
                    <i class="bi bi-plus-circle" (click)="onStep('fat')"></i>
                </div>
                <div class="header2" *ngFor="let steps of fatStep; index as i">
                    <span>{{steps.step | number:'1.2-2'}}</span>
                    <span>{{steps.amount | number:'1.2-2'}}</span>
                    <i class="bi bi-x" (click)="onRemoveFat(i)"></i>
                </div>
            </div>
            <div class="step">
                <div class="header">
                    <span>Snf Step</span>
                    <i class="bi bi-plus-circle" (click)="onStep('snf')"></i>
                </div>
                <div class="header2" *ngFor="let steps of snfStep; index as i">
                    <span>{{steps.step | number:'1.2'}}</span>
                    <span>{{steps.amount | number:'1.2'}}</span>
                    <i class="bi bi-x" (click)="onRemoveSnf(i)"></i>
                </div>
            </div>
        </div>
    </div>
    <div class="chart">
        <table>
            <tr *ngFor="let row of arr;index as i">{{i}}&nbsp;
               <td *ngFor="let value of row; index as j" class="" style="border: 2px solid black;">{{ value | number:'1.2-2'}}&nbsp;&nbsp;&nbsp;</td>
            </tr>
          </table>
    </div>
</div>

<div class="popup" *ngIf="isPopup" (click)="onClose()">
    <div class="box" (click)="onClose2($event)">
        <h2 *ngIf="isFatStep">Fat Step</h2>
        <h2 *ngIf="isSnfStep">Snf Step</h2>

        <form [formGroup]="stepForm">
        <div class="stepDetails">
            Step : &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<input type="number" placeholder="0.0" formControlName="step"><br>
            Amount : <input type="number" placeholder="0.0" formControlName="amount">
        </div>
        <div class="btns">
            <button class="login" style="width: 100px; height: 30px; font-size: 18px;"(click)="onCancel()">Cancel</button>
            <button class="signup" style="width: 100px; height: 30px; font-size: 18px;" (click)="onOk()">Ok</button>
        </div>
    </form>
    </div>
</div>
