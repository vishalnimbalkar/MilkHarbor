<div class="milkCollection">
    <div class="title text-center m-3">
        <h1>Milk Collection</h1>
    </div>
    <div class="form">
        <form [formGroup]="milkForm">
            <label for="f_id">Select Farmer</label>
            <input type="text" id="f_id" (click)="toggleDropdown()" [(ngModel)]="selectedOption" class="form-control"
                formControlName="f_id">

            <i class="bi bi-chevron-down" [ngClass]="{'rotate':isDropdownOpen}" (click)="toggleDropdown()"></i>

            <ul class="dropdown-list" *ngIf="isDropdownOpen">
                <li *ngFor="let farmer of FarmersList">{{ farmer.name }}</li>
            </ul>

            <label style="margin-top: 10px;">Select Milk Type</label><br>
            <select name="" id="">
                <option value="cow">Cow</option>
                <option value="buffalo">buffalo</option>
            </select>
        </form>
    </div>
</div>
