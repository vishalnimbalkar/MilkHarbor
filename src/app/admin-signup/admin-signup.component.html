<app-header></app-header>
<section>
    <h1>SignUp</h1>
    <div class="signupForm">
        <form id="form1">
            <div class="form-group">
                <label for="name">First Name</label><br>
                <input class="form-control" type="text" id="fname" formControlName="fname"
                    placeholder=" &nbsp; Enter First Name " minlength="1" required>
            </div>
            <div class="form-group">
                <label for="name">Last Name</label><br>
                <input class="form-control" type="text" id="lname" formControlName="lname"
                    placeholder=" &nbsp; Enter Last Name " minlength="1" required>
            </div>
            <div class="form-group">
                <label for="email">Email address</label><br>
                <input class="form-control" type="email" id="email" formControlName="email"
                    placeholder=" &nbsp; Enter Email Address " required>
            </div>
            <div class="form-group">
                <label for="mno">Mobile Number</label><br>
                <input class="form-control" type="text" id="mno" formControlName="mno"
                    placeholder=" &nbsp; Enter Mobile Number " minlength="10" required>
            </div>
            <div class="form-group">
                <label for="name">Password</label><br>
                <input class="form-control" type="password" id="name" formControlName="password"
                    placeholder=" &nbsp; Enter Password " minlength="8" required>
            </div>
            <div class="form-group">
                <label for="name">Re-enter Password</label><br>
                <input class="form-control" type="repassword" id="name" formControlName="repassword"
                    placeholder=" &nbsp;Re-enter Password " minlength="8" required>
            </div>
            <div class="btn">
                <button class="signup mt-3">Signup</button>
            </div>
        </form>
    </div>
</section>
